name: CI — Wallet App

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  ci:
    name: Build, Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build & start containers
        run: docker compose up -d --build --wait
        timeout-minutes: 5

      - name: Setup environment
        run: |
          docker compose exec -T app cp .env.example .env
          docker compose exec -T app php artisan key:generate

      - name: Wait for MySQL
        run: |
          echo "Waiting for MySQL to be ready..."
          for i in {1..30}; do
            if docker compose exec -T mysql mysqladmin ping -h localhost -u root -proot --silent; then
              echo "MySQL is ready!"
              break
            fi
            echo "Waiting for MySQL... attempt $i/30"
            sleep 2
          done
          
          # Создаем БД если её нет
          docker compose exec -T mysql mysql -u root -proot -e "CREATE DATABASE IF NOT EXISTS Wallet;"
          
          # Проверяем подключение через PHP
          docker compose exec -T app php -r "
            try {
              new PDO('mysql:host=mysql;port=3306;dbname=Wallet', 'root', 'root');
              echo '✓ Database connection successful\n';
            } catch (PDOException \$e) {
              echo '✗ Database connection failed: ' . \$e->getMessage() . '\n';
              exit(1);
            }
          "

      - name: Run migrations
        run: docker compose exec -T app php artisan migrate --force

      - name: PHP syntax check
        run: |
          docker compose exec -T app \
            find app -name "*.php" -exec php -l {} \;

      - name: Fix code style
        run: docker compose exec -T app ./vendor/bin/pint
        
      - name: Verify code style
        run: docker compose exec -T app ./vendor/bin/pint --test

      - name: Run PHPUnit tests
        run: docker compose exec -T app php artisan test --env=testing
        
      - name: Show logs on failure
        if: failure()
        run: docker compose logs app mysql

      - name: Shutdown
        if: always()
        run: docker compose down -v