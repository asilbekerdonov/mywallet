name: CI — Wallet App

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  ci:
    name: Build, Lint & Test
    runs-on: ubuntu-latest

    steps:
      # ── 1. Получаем код ────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Создаём .env из .env.example ───────────
      # GitHub Actions не имеет твоего .env — создаём его
      - name: Copy .env
        run: cp .env.example .env

      # ── 3. Поднимаем Docker (mysql + app + nginx) ─
      # --wait ждёт healthcheck mysql (ты его уже настроил!)
      - name: Build & start containers
        run: docker compose up -d --build --wait
        timeout-minutes: 5

      # ── 4. Генерируем APP_KEY внутри контейнера ───
      - name: Generate app key
        run: docker compose exec -T app php artisan key:generate

      # ── 5. Запускаем миграции ──────────────────────
      # --force нужен для non-interactive окружения
      - name: Run migrations
        run: docker compose exec -T app php artisan migrate --force

      # ── 6. Проверка синтаксиса PHP ─────────────────
      - name: PHP syntax check
        run: |
          docker compose exec -T app \
            find app -name "*.php" -exec php -l {} \;

      # ── 7. Laravel Pint — стиль кода ──────────────
      # make lint уже есть в твоём Makefile!
      - name: Laravel Pint
        run: docker compose exec -T app ./vendor/bin/pint --test


      # ── 9. Логи при падении (для отладки) ─────────
      - name: Show logs on failure
        if: failure()
        run: docker compose logs app mysql

      # ── 10. Останавливаем контейнеры ──────────────
      - name: Shutdown
        if: always()
        run: docker compose down -v